<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tropheo Widgets - HTML Example</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f9fafb;
      }

      h1 {
        color: #111827;
        margin-bottom: 10px;
      }

      .description {
        color: #6b7280;
        margin-bottom: 30px;
      }

      #standings-container {
        margin-top: 20px;
      }

      .error {
        padding: 20px;
        background-color: #fee2e2;
        border: 1px solid #ef4444;
        border-radius: 8px;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <h1>Tropheo Widgets - Vanilla HTML Example</h1>
    <p class="description">
      This example demonstrates how to embed Tropheo standings widget using plain HTML and
      JavaScript.
    </p>

    <div id="standings-container"></div>

    <!-- Load the widget library -->
    <script src="https://unpkg.com/@tropheo/embed@latest/dist/index.js"></script>

    <script>
      (function () {
        // Configuration
        const API_KEY = 'your-api-key-here'; // Get this from your Tropheo admin
        const BASE_URL = 'https://your-tropheo-instance.com'; // Your Tropheo site URL
        const EVENT_ID = 'your-event-id-here'; // Get this from the event URL

        try {
          // Initialize Tropheo Embed
          const embed = new window.TropheoEmbed({
            apiKey: API_KEY,
            baseUrl: BASE_URL,
          });

          // Render standings widget
          // The widget automatically detects event type and shows appropriate grouping
          embed.renderStandings({
            eventId: EVENT_ID,
            title: 'Tournament Standings',
            showEmptyState: true,
            container: '#standings-container',
            lang: 'en', // Language: 'en' or 'es'
          });
        } catch (error) {
          document.getElementById('standings-container').innerHTML =
            '<div class="error">Error: ' + error.message + '</div>';
        }
      })();
    </script>
  </body>
</html>
